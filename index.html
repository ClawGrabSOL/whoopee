<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>$WHOOPEE — press it</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💨</text></svg>"/>
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0a;
      --green: #00ff88;
      --yellow: #ffe000;
      --pink: #ff69b4;
      --orange: #ff8c00;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
      display: flex; flex-direction: column; align-items: center;
      cursor: crosshair;
    }

    /* STARS */
    .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .star { position: absolute; border-radius: 50%; background: #fff; animation: twinkle var(--d) infinite; }
    @keyframes twinkle { 0%,100%{opacity:var(--o)} 50%{opacity:0.1} }

    /* HEADER */
    header {
      width: 100%; padding: 16px 24px;
      display: flex; align-items: center; justify-content: center;
      position: relative; z-index: 10;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .logo { font-family: 'Black Han Sans', sans-serif; font-size: 24px; letter-spacing: 3px; }
    .logo span { color: var(--green); }

    /* SOUND TOGGLE */
    .sound-btn {
      position: fixed; top: 16px; right: 16px; z-index: 100;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.4); font-size: 18px; width: 36px; height: 36px;
      border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .sound-btn:hover { background: rgba(255,255,255,0.1); }

    /* STATS */
    .stats-bar {
      display: flex; gap: 40px; padding: 20px 24px;
      justify-content: center; flex-wrap: wrap;
      position: relative; z-index: 10;
    }
    .stat { text-align: center; }
    .stat-val { font-family: 'Black Han Sans', sans-serif; font-size: 32px; color: var(--green); }
    .stat-lbl { font-size: 10px; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 2px; }

    /* STAGE */
    .stage {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 20px; position: relative; z-index: 10;
      min-height: 58vh;
    }
    .stage-title {
      font-family: 'Black Han Sans', sans-serif;
      font-size: clamp(14px, 2.5vw, 20px);
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.2em; text-transform: uppercase;
      margin-bottom: 28px; text-align: center;
    }
    .stage-title b { color: var(--yellow); }

    /* CUSHION */
    .cushion-wrap {
      position: relative; cursor: pointer;
      user-select: none; -webkit-user-select: none;
      margin-bottom: 32px;
    }
    .cushion-wrap.squish { animation: squish 0.4s cubic-bezier(.36,.07,.19,.97); }
    @keyframes squish {
      0%   { transform: scale(1); }
      15%  { transform: scale(1.08, 0.75) rotate(-3deg); }
      30%  { transform: scale(0.82, 1.12) rotate(2deg); }
      50%  { transform: scale(1.05, 0.88) rotate(-1deg); }
      70%  { transform: scale(0.96, 1.04); }
      100% { transform: scale(1); }
    }
    .cushion-svg { width: clamp(200px, 40vw, 340px); height: auto; filter: drop-shadow(0 20px 40px rgba(232,168,124,0.25)); }
    .cushion-svg .body   { fill: #e8a87c; }
    .cushion-svg .body2  { fill: #d4956a; }
    .cushion-svg .rim    { fill: #c47d52; }
    .cushion-svg .nozzle { fill: #b06a3a; }
    .cushion-svg .highlight { fill: rgba(255,255,255,0.25); }
    .cushion-svg .wrinkle { stroke: #c47d52; stroke-width: 2; fill: none; }

    .fart-cloud { position: absolute; pointer-events: none; font-size: 32px; opacity: 0; }
    .fart-cloud.pop { animation: cloudPop 1.2s ease-out forwards; }
    @keyframes cloudPop {
      0%   { opacity:1; transform:translateY(0) scale(0.5) rotate(-10deg); }
      40%  { opacity:1; transform:translateY(-60px) scale(1.4) rotate(8deg); }
      100% { opacity:0; transform:translateY(-140px) scale(0.8) rotate(-5deg); }
    }

    /* PRESS HINT */
    .press-hint {
      font-family: 'Black Han Sans', sans-serif;
      font-size: clamp(28px, 6vw, 56px);
      letter-spacing: 4px; text-transform: uppercase;
      color: var(--yellow);
      text-shadow: 0 0 30px rgba(255,224,0,0.5);
      animation: hintPulse 1.8s ease-in-out infinite;
      margin-bottom: 8px;
    }
    @keyframes hintPulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.6;transform:scale(0.97)} }
    .press-sub { font-size: 12px; color: rgba(255,255,255,0.25); letter-spacing: 0.1em; text-align: center; }

    /* RING GLOW */
    .ring-wrap { position: relative; display: flex; align-items: center; justify-content: center; }
    .ring-glow {
      position: absolute; width: clamp(220px,44vw,380px); height: clamp(220px,44vw,380px);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(232,168,124,0.08), transparent 70%);
      pointer-events: none; animation: ringPulse 2s ease-in-out infinite;
    }
    @keyframes ringPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }

    /* NOTIFICATIONS */
    #buyNotif {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.92); border: 1px solid var(--green);
      border-radius: 12px; padding: 14px 28px; font-size: 15px; font-weight: 700;
      color: var(--green); z-index: 100; white-space: nowrap;
      display: none; align-items: center; gap: 8px;
      box-shadow: 0 0 30px rgba(0,255,136,0.2);
    }
    #buyNotif.show { display: flex; animation: slideUp 0.3s ease; }
    @keyframes slideUp { from{transform:translateX(-50%) translateY(20px);opacity:0} to{transform:translateX(-50%) translateY(0);opacity:1} }

    /* FLOATING TEXT */
    .fart-text {
      position: fixed; pointer-events: none; z-index: 50;
      font-family: 'Black Han Sans', sans-serif;
      font-size: clamp(20px, 4vw, 40px);
      animation: fartTextPop 1.5s ease-out forwards;
      text-shadow: 0 0 20px currentColor;
    }
    @keyframes fartTextPop {
      0%   { opacity:1; transform:translateY(0) scale(0.5) rotate(var(--rot)); }
      30%  { opacity:1; transform:translateY(-40px) scale(1.2) rotate(calc(var(--rot)*-0.5)); }
      100% { opacity:0; transform:translateY(-120px) scale(0.8) rotate(var(--rot)); }
    }
    .dollar { position: fixed; pointer-events: none; z-index: 50; font-size: 20px; animation: dollarFloat 2s ease-out forwards; }
    @keyframes dollarFloat { 0%{opacity:1;transform:translateY(0) rotate(0deg)} 100%{opacity:0;transform:translateY(-200px) rotate(720deg)} }
    .gas { position: fixed; pointer-events: none; z-index: 49; border-radius: 50%; background: rgba(0,255,136,0.15); animation: gasDrift 1.5s ease-out forwards; }
    @keyframes gasDrift { 0%{opacity:0.8;transform:scale(0) translate(var(--dx),var(--dy))} 50%{opacity:0.4} 100%{opacity:0;transform:scale(3) translate(calc(var(--dx)*2),calc(var(--dy)*2))} }

    /* FEED */
    .buy-feed {
      position: fixed; bottom: 16px; left: 16px;
      display: flex; flex-direction: column-reverse; gap: 6px;
      max-height: 200px; overflow: hidden; z-index: 10; pointer-events: none;
    }
    .feed-item {
      background: rgba(0,0,0,0.8); border: 1px solid rgba(0,255,136,0.2);
      border-radius: 8px; padding: 8px 12px; font-size: 11px;
      color: rgba(255,255,255,0.55); max-width: 280px;
      animation: feedSlide 0.3s ease;
    }
    .feed-item b { color: var(--green); }
    @keyframes feedSlide { from{opacity:0;transform:translateX(-20px)} to{opacity:1;transform:translateX(0)} }

    /* SHAKE */
    @keyframes shake {
      0%,100%{transform:translate(0)} 10%{transform:translate(-4px,2px)} 20%{transform:translate(4px,-2px)}
      30%{transform:translate(-3px,-3px)} 40%{transform:translate(3px,2px)} 50%{transform:translate(-2px,3px)}
      60%{transform:translate(2px,-3px)} 70%{transform:translate(-3px,1px)} 80%{transform:translate(3px,-1px)} 90%{transform:translate(-1px,2px)}
    }
    body.shake { animation: shake 0.4s ease; }

    @media(max-width:480px){ .stats-bar{gap:20px;} .stat-val{font-size:24px;} }
  </style>
</head>
<body>

<div class="stars" id="stars"></div>
<button class="sound-btn" id="soundBtn" onclick="toggleSound()">🔊</button>

<header>
  <div class="logo">$<span>WHOOPEE</span></div>
</header>

<div class="stats-bar">
  <div class="stat">
    <div class="stat-val" id="squishCount">—</div>
    <div class="stat-lbl">total squishes</div>
  </div>
  <div class="stat">
    <div class="stat-val" id="solBought">—</div>
    <div class="stat-lbl">SOL bought</div>
  </div>
  <div class="stat">
    <div class="stat-val" id="txCount">—</div>
    <div class="stat-lbl">transactions</div>
  </div>
  <div class="stat">
    <div class="stat-val" id="holdersCount">—</div>
    <div class="stat-lbl">holders</div>
  </div>
</div>

<div class="stage">
  <div class="stage-title">every click dev buys <b>0.01 SOL</b> of $WHOOPEE</div>

  <div class="ring-wrap">
    <div class="ring-glow"></div>
    <div class="cushion-wrap" id="cushion" onclick="squish()">
      <svg class="cushion-svg" viewBox="0 0 300 240" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="150" cy="232" rx="110" ry="10" fill="rgba(0,0,0,0.3)"/>
        <ellipse cx="150" cy="145" rx="130" ry="90" class="body"/>
        <ellipse cx="150" cy="120" rx="115" ry="75" class="body2"/>
        <ellipse cx="150" cy="160" rx="130" ry="20" class="rim"/>
        <path d="M 60 120 Q 80 100 100 120" class="wrinkle"/>
        <path d="M 200 120 Q 220 100 240 120" class="wrinkle"/>
        <path d="M 90 150 Q 120 130 150 150" class="wrinkle"/>
        <path d="M 150 150 Q 180 130 210 150" class="wrinkle"/>
        <path d="M 70 140 Q 90 155 110 140" class="wrinkle"/>
        <path d="M 190 140 Q 210 155 230 140" class="wrinkle"/>
        <ellipse cx="120" cy="100" rx="40" ry="25" class="highlight"/>
        <ellipse cx="105" cy="95" rx="15" ry="10" fill="rgba(255,255,255,0.15)"/>
        <rect x="130" y="54" width="40" height="18" rx="4" class="nozzle"/>
        <rect x="138" y="44" width="24" height="14" rx="3" class="nozzle"/>
        <ellipse cx="150" cy="44" rx="12" ry="5" fill="#8a4a20"/>
        <text x="150" y="170" text-anchor="middle" font-family="'Black Han Sans',sans-serif" font-size="18" fill="rgba(0,0,0,0.2)" transform="rotate(-5,150,170)">WHOOPEE</text>
      </svg>
      <div class="fart-cloud" id="fartCloud">💨</div>
    </div>
  </div>

  <div class="press-hint">PRESS IT</div>
  <div class="press-sub">click it. every squish is a buy.</div>
</div>

<div id="buyNotif">
  <span id="buyNotifText">💨 BOUGHT 0.01 SOL OF $WHOOPEE</span>
</div>

<div class="buy-feed" id="buyFeed"></div>

<script>
// ── GLOBAL STATS (CountAPI — persists worldwide for all users) ──
const NS   = 'clawgrabsol-whoopee-v2';
const CAPI = 'https://api.countapi.xyz';

async function globalIncrement(key) {
  try { const r = await fetch(`${CAPI}/hit/${NS}/${key}`); const d = await r.json(); return d.value || 0; }
  catch { return null; }
}
async function globalGet(key) {
  try { const r = await fetch(`${CAPI}/get/${NS}/${key}`); const d = await r.json(); return d.value || 0; }
  catch { return null; }
}

function setStats(sq, tx) {
  if (sq !== null) document.getElementById('squishCount').textContent = Number(sq).toLocaleString();
  if (tx !== null) {
    document.getElementById('txCount').textContent    = Number(tx).toLocaleString();
    document.getElementById('solBought').textContent  = (tx * 0.01).toFixed(2);
    document.getElementById('holdersCount').textContent = Math.max(1, Math.floor(tx / 3)).toLocaleString();
  }
}

async function loadGlobalStats() {
  const [sq, tx] = await Promise.all([globalGet('squishes'), globalGet('txs')]);
  setStats(sq, tx);
}

// Poll every 5 seconds so everyone worldwide sees live count
setInterval(loadGlobalStats, 5000);
loadGlobalStats();

// ── LOCAL STATE ──
let squishes = 0;
let txCount  = 0;
let soundOn  = true;
let isSquishing = false;
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

// ── STARS ──
const starsEl = document.getElementById('stars');
for (let i = 0; i < 80; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const size = Math.random() * 2 + 0.5;
  s.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--o:${Math.random()*0.6+0.1};--d:${Math.random()*4+2}s;animation-delay:${Math.random()*4}s`;
  starsEl.appendChild(s);
}

// ── SOUND ──
function playFart() {
  if (!soundOn) return;
  try {
    const osc = audioCtx.createOscillator(), gain = audioCtx.createGain(), dist = audioCtx.createWaveShaper();
    const curve = new Float32Array(256);
    for (let i = 0; i < 256; i++) curve[i] = i < 128 ? -1 + (i/128)*2 : 0;
    dist.curve = curve;
    osc.connect(dist); dist.connect(gain); gain.connect(audioCtx.destination);
    const t = audioCtx.currentTime;
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(120 + Math.random()*30, t);
    osc.frequency.exponentialRampToValueAtTime(30 + Math.random()*20, t + 0.5);
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.6, t + 0.04);
    gain.gain.setValueAtTime(0.6, t + 0.1);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.55);
    osc.start(t); osc.stop(t + 0.6);
  } catch(e) {}
}

function playCoin() {
  if (!soundOn) return;
  try {
    const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    const t = audioCtx.currentTime;
    osc.type = 'sine';
    osc.frequency.setValueAtTime(880, t);
    osc.frequency.exponentialRampToValueAtTime(1760, t + 0.08);
    gain.gain.setValueAtTime(0.3, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    osc.start(t); osc.stop(t + 0.3);
  } catch(e) {}
}

function toggleSound() {
  soundOn = !soundOn;
  document.getElementById('soundBtn').textContent = soundOn ? '🔊' : '🔇';
}

// ── FX ──
const fartWords  = ['PFFFT','BRRRAP','TOOT','SPLAT','PRRRP','RIIIIP','BLAP','SQUEAK','THBBT','PBBBF'];
const fartColors = ['#00ff88','#ffe000','#ff69b4','#00f0ff','#ff8c00'];

function spawnFartText(x, y) {
  const el = document.createElement('div');
  el.className = 'fart-text';
  el.textContent = fartWords[Math.floor(Math.random() * fartWords.length)];
  const rot = (Math.random() - 0.5) * 40;
  el.style.cssText = `left:${x}px;top:${y}px;color:${fartColors[Math.floor(Math.random()*fartColors.length)]};--rot:${rot}deg;transform:translateX(-50%)`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1600);
}

function spawnDollars(x, y) {
  for (let i = 0; i < 8; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'dollar';
      el.textContent = '💰';
      el.style.cssText = `left:${x + (Math.random()-0.5)*120}px;top:${y + (Math.random()-0.5)*60}px;animation-delay:${Math.random()*0.3}s`;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 2200);
    }, i * 60);
  }
}

function spawnGas(x, y) {
  for (let i = 0; i < 6; i++) {
    const el = document.createElement('div');
    el.className = 'gas';
    const size = 30 + Math.random() * 50;
    const dx = (Math.random()-0.5)*100, dy = -(Math.random()*80+20);
    el.style.cssText = `left:${x}px;top:${y}px;width:${size}px;height:${size}px;margin-left:-${size/2}px;margin-top:-${size/2}px;--dx:${dx}px;--dy:${dy}px;animation-delay:${i*0.08}s`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1600);
  }
}

// ── SQUISH ──
async function squish() {
  if (isSquishing) return;
  isSquishing = true;
  audioCtx.resume();

  // Optimistic local count
  squishes++;
  document.getElementById('squishCount').textContent = squishes.toLocaleString();

  // Animations
  const cushion = document.getElementById('cushion');
  cushion.classList.remove('squish');
  void cushion.offsetWidth;
  cushion.classList.add('squish');

  const cloud = document.getElementById('fartCloud');
  cloud.classList.remove('pop');
  void cloud.offsetWidth;
  cloud.classList.add('pop');

  document.body.classList.remove('shake');
  void document.body.offsetWidth;
  document.body.classList.add('shake');
  setTimeout(() => document.body.classList.remove('shake'), 400);

  playFart();

  const rect = cushion.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 3;
  spawnFartText(cx, cy);
  spawnGas(cx, cy);

  setTimeout(() => { cushion.classList.remove('squish'); isSquishing = false; }, 450);

  // Increment global counters
  globalIncrement('squishes').then(v => {
    if (v !== null) { squishes = v; document.getElementById('squishCount').textContent = Number(v).toLocaleString(); }
  });

  // Simulate buy delay then increment tx
  await new Promise(r => setTimeout(r, 500));
  txCount++;
  playCoin();
  spawnDollars(cx, cy);
  addFeedItem();
  showNotif('💨 BOUGHT 0.01 SOL OF $WHOOPEE');

  globalIncrement('txs').then(v => {
    if (v !== null) {
      txCount = v;
      setStats(null, v);
    }
  });
}

// ── NOTIF ──
let notifTO;
function showNotif(text) {
  clearTimeout(notifTO);
  document.getElementById('buyNotifText').textContent = text;
  const n = document.getElementById('buyNotif');
  n.classList.remove('show'); void n.offsetWidth; n.classList.add('show');
  notifTO = setTimeout(() => n.classList.remove('show'), 3000);
}

// ── FEED ──
const feedNames = ['7xK...3mP','9aR...1vQ','4bN...8wX','GrB...7nK','Ax3...9pL','Q7z...2mT','Pf9...4sW','Rn2...8kZ'];
function addFeedItem() {
  const feed = document.getElementById('buyFeed');
  const el = document.createElement('div');
  el.className = 'feed-item';
  el.innerHTML = `<b>💨 ${feedNames[Math.floor(Math.random()*feedNames.length)]}</b> bought 0.01 SOL of $WHOOPEE`;
  feed.insertBefore(el, feed.firstChild);
  if (feed.children.length > 5) feed.removeChild(feed.lastChild);
}

// Spacebar support
document.addEventListener('keydown', e => { if (e.code === 'Space' && !e.repeat) { e.preventDefault(); squish(); } });
</script>
</body>
</html>
